<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Dream Office</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #e0e0ff;
  font-family: 'Courier New', Courier, monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
#header {
  background: linear-gradient(90deg, #12082a, #0a1428);
  border-bottom: 2px solid #3a2070;
  padding: 8px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 10;
}
#header h1 { font-size: 13px; color: #ff9f1c; letter-spacing: 3px; text-transform: uppercase; }
.hbadge {
  display: inline-block; padding: 3px 9px; margin-left: 6px;
  border-radius: 3px; font-size: 10px;
  background: #1e1040; border: 1px solid #5040a0; color: #b090ff;
}
#main { flex: 1; display: flex; overflow: hidden; }
#room-wrap {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, #0f0a22 0%, #06060f 100%);
}
#room-wrap::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, #1a0a3020 0%, transparent 60%);
  pointer-events: none;
}

/* Agent Panel */
#agent-panel {
  width: 360px; min-width: 360px;
  background: #0c0c1e;
  border-left: 2px solid #2e2060;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  flex-shrink: 0;
}
#agent-panel.open { transform: translateX(0); }
.panel-header {
  padding: 12px 14px;
  border-bottom: 2px solid #3a2870;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
.p-avatar {
  width: 38px; height: 38px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  background: #1a1040; border: 1px solid #4a3090;
}
.p-info h3 { font-size: 11px; color: #ffcf7a; margin-bottom: 2px; }
.p-info p { font-size: 9px; color: #7777aa; }
.p-close {
  margin-left: auto; background: none; border: none;
  cursor: pointer; color: #6660aa; font-size: 16px; line-height: 1;
}
.p-close:hover { color: #ff5577; }
.panel-chat {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 8px;
}
.cmsg {
  padding: 9px 11px; border-radius: 8px;
  font-size: 10.5px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
}
.cmsg.agent { background: #1a1040; border: 1px solid #3e2880; align-self: flex-start; color: #ccc0ff; max-width: 92%; }
.cmsg.user  { background: #0e2238; border: 1px solid #284878; align-self: flex-end; color: #b8d4ff; max-width: 85%; }
.cmsg.sys   { background: #0e2018; border: 1px solid #2a5030; align-self: center; color: #88cc77; font-size: 9.5px; text-align: center; }
.panel-input { border-top: 2px solid #2e2060; padding: 10px; flex-shrink: 0; }
.irow { display: flex; gap: 7px; }
.panel-input input, .panel-input textarea {
  flex: 1; background: #12122a; border: 1px solid #3e3870;
  border-radius: 6px; color: #d0d0ff; padding: 7px 10px;
  font-family: inherit; font-size: 10.5px; outline: none;
}
.panel-input input:focus, .panel-input textarea:focus { border-color: #6050cc; }
.panel-input textarea { resize: none; height: 52px; }
.btn {
  padding: 7px 13px; border-radius: 6px; border: none;
  cursor: pointer; font-family: inherit; font-size: 10px;
  font-weight: bold; transition: all 0.15s; white-space: nowrap;
}
.btn-p { background: #4a38a8; color: #e0d8ff; border: 1px solid #6a58c8; }
.btn-p:hover { background: #5a48b8; }
.btn-s { background: #281838; color: #9090bb; border: 1px solid #4a3880; }
.btn-s:hover { background: #381848; }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }
.frow { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.file-drop {
  border: 2px dashed #3e3870; border-radius: 8px;
  padding: 16px; text-align: center; cursor: pointer;
  margin-bottom: 8px; transition: all 0.18s;
  font-size: 10.5px; color: #7070aa;
}
.file-drop:hover, .file-drop.over { border-color: #7060cc; background: #181828; color: #b0a0ff; }

/* loading dots */
.ldot { display: inline-block; width: 7px; height: 7px; background: #7060c0; border-radius: 50%; animation: lblink 0.8s infinite; margin: 0 2px; }
.ldot:nth-child(2) { animation-delay: 0.2s; }
.ldot:nth-child(3) { animation-delay: 0.4s; }
@keyframes lblink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.2;transform:scale(0.7)} }

/* signal tags */
.stag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; margin: 1px; font-weight: bold; }
.stag-buy  { background: #062010; color: #44ee88; border: 1px solid #246840; }
.stag-sell { background: #200606; color: #ee4444; border: 1px solid #682424; }
.stag-hold { background: #181404; color: #ddcc44; border: 1px solid #685820; }

/* character hotspot */
.chs { cursor: pointer; }
.chs:hover .cglow { opacity: 0.18 !important; }
.cglow { opacity: 0; transition: opacity 0.2s; }

/* speech bubble float */
@keyframes fbubble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
.fb { animation: fbubble 2.8s ease-in-out infinite; }
.fb2 { animation: fbubble 2.8s ease-in-out infinite; animation-delay: 0.7s; }
.fb3 { animation: fbubble 2.8s ease-in-out infinite; animation-delay: 1.2s; }
.fb4 { animation: fbubble 2.8s ease-in-out infinite; animation-delay: 1.9s; }

/* status bar */
#sbar {
  background: #07070f; border-top: 1px solid #1e1840;
  padding: 4px 14px; display: flex; gap: 18px;
  font-size: 9.5px; color: #4a4888; flex-shrink: 0;
}
#sbar b { color: #7a78bb; }
.sdot { display:inline-block; width:5px;height:5px;border-radius:50%;background:#44cc77;margin-right:4px;vertical-align:middle; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #0c0c1e; }
::-webkit-scrollbar-thumb { background: #322870; border-radius: 3px; }

/* API Key Modal */
#key-modal {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.75); align-items: center; justify-content: center;
}
#key-modal.show { display: flex; }
.modal-box {
  background: #0c0c1e; border: 2px solid #4a38a0; border-radius: 10px;
  padding: 22px 24px; width: 340px; max-width: 90vw;
}
.modal-box h2 { font-size: 12px; color: #ff9f1c; margin-bottom: 6px; letter-spacing: 2px; }
.modal-box p { font-size: 10px; color: #6666aa; margin-bottom: 12px; line-height: 1.6; }
.modal-box input {
  width: 100%; background: #12122a; border: 1px solid #3e3870;
  border-radius: 6px; color: #d0d0ff; padding: 8px 10px;
  font-family: inherit; font-size: 10px; outline: none; margin-bottom: 10px;
}
.modal-box input:focus { border-color: #6050cc; }
.modal-box .mrow { display: flex; gap: 8px; }
.key-btn {
  background: none; border: none; cursor: pointer;
  color: #7060aa; font-size: 10px; font-family: inherit;
  padding: 3px 8px; border-radius: 4px; transition: color 0.15s;
}
.key-btn:hover { color: #ff9f1c; }
.key-status { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
  background: #444466; vertical-align: middle; margin-right: 5px; transition: background 0.3s; }
.key-status.ok { background: #44cc77; }
</style>

    </div>
    <div class="panel-chat" id="pchat"></div>
    <div class="panel-input" id="pinput"></div>
  </div>
</div>

<div id="sbar">
  <span><span class="sdot"></span><b>SYSTEM ONLINE</b></span>
  <span>📊 ALEX — Stock Analyzer</span>
  <span>🔍 MAYA — Market Scout</span>
  <span>📂 KEN — Data Analyst</span>
  <span>🎨 LUNA — Presenter</span>
</div>

<script>
// ---- Claude API bridge ----
let _apiKey = '';
try { _apiKey = localStorage.getItem('pdoApiKey') || ''; } catch(e){}

window.cowork = {
  askClaude: async function(prompt, _ctx) {
    if (!_apiKey) {
      showKeyModal();
      throw new Error('กรุณาใส่ Anthropic API Key ก่อนใช้งานค่ะ');
    }
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': _apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${resp.status}`);
    }
    const data = await resp.json();
    return data.content[0].text;
  }
};

function showKeyModal() {
  document.getElementById('key-modal').classList.add('show');
  document.getElementById('key-input').value = _apiKey;
  document.getElementById('key-msg').textContent = '';
}
function hideKeyModal() { document.getElementById('key-modal').classList.remove('show'); }
function saveKey() {
  const v = document.getElementById('key-input').value.trim();
  if (!v) { document.getElementById('key-msg').textContent = '⚠️ กรุณาใส่ API Key'; return; }
  if (!v.startsWith('sk-ant-')) {
    document.getElementById('key-msg').textContent = '⚠️ API Key ไม่ถูกต้อง (ต้องขึ้นต้นด้วย sk-ant-)';
    return;
  }
  _apiKey = v;
  try { localStorage.setItem('pdoApiKey', v); } catch(e){}
  document.getElementById('kstatus').classList.add('ok');
  document.getElementById('key-msg').textContent = '✅ บันทึกแล้ว!';
  setTimeout(hideKeyModal, 800);
}
function clearKey() {
  _apiKey = '';
  try { localStorage.removeItem('pdoApiKey'); } catch(e){}
  document.getElementById('key-input').value = '';
  document.getElementById('kstatus').classList.remove('ok');
  document.getElementById('key-msg').textContent = '🗑️ ลบ Key แล้ว';
}
// init key status indicator
if (_apiKey) document.getElementById('kstatus').classList.add('ok');

const AGENTS = {
  1: { name:'ALEX — Stock Analyzer', sub:'พิมพ์ ticker วิเคราะห์ ซื้อ/ขาย/ถือ', av:'📊', color:'#1a4488',
    intro:'สวัสดีครับ! ผม Alex นักวิเคราะห์หุ้น 📊\n\nพิมพ์ชื่อย่อหุ้นที่ต้องการวิเคราะห์\nเช่น AAPL, NVDA, TSLA, PTT.BK, SCB.BK\n\nผมจะวิเคราะห์ให้ว่าควร ✅ซื้อ / ❌ขาย / ⏸️ถือ ครับ' },
  2: { name:'MAYA — Market Scout', sub:'สแกนตลาด หาหุ้นน่าซื้อวันนี้', av:'🔍', color:'#7a1280',
    intro:'สวัสดีค่ะ! หนู Maya ผู้เชี่ยวชาญสแกนตลาด 🔍\n\nเลือกตลาดที่ต้องการ แล้วหนูจะบอก\nหุ้นที่น่าสนใจ พร้อมเหตุผลทันทีค่ะ!' },
  3: { name:'KEN — Data Analyst', sub:'อัพโหลด Excel/CSV วิเคราะห์ข้อมูล', av:'📂', color:'#165a26',
    intro:'สวัสดีครับ! ผม Ken Data Analyst 📂\n\nอัพโหลดไฟล์ .csv หรือวางข้อมูล\nแล้วผมจะวิเคราะห์ insights ให้ทันทีครับ!\n\n💡 หลังวิเคราะห์แล้ว Luna ใช้ข้อมูลนี้สร้าง Presentation ได้เลย' },
  4: { name:'LUNA — Presenter', sub:'สร้าง Presentation จากข้อมูลหรือหัวข้อ', av:'🎨', color:'#6a0888',
    intro:'สวัสดีค่ะ! หนู Luna ผู้เชี่ยวชาญ Presentation 🎨\n\nหนูจะสร้างโครงสร้างสไลด์จากข้อมูลของ Ken\nหรือระบุหัวข้อที่ต้องการได้เลยค่ะ!' }
};

let cur = null;
let analysisData = null;
try { analysisData = JSON.parse(localStorage.getItem('pdoAnalysis') || 'null'); } catch(e){}

function openAgent(id) {
  cur = id;
  const a = AGENTS[id];
  document.getElementById('pav').textContent = a.av;
  document.getElementById('ptitle').textContent = a.name;
  document.getElementById('psub').textContent = a.sub;
  document.getElementById('phdr').style.borderBottomColor = a.color;
  const chat = document.getElementById('pchat');
  chat.innerHTML = '';
  addMsg('agent', a.intro);
  document.getElementById('pinput').innerHTML = buildUI(id);
  document.getElementById('agent-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('agent-panel').classList.remove('open');
  cur = null;
}

function buildUI(id) {
  if (id === 1) return `
    <div class="irow" style="margin-bottom:6px">
      <input id="ti" type="text" placeholder="พิมพ์ ticker: AAPL, NVDA, PTT.BK..." maxlength="12"
             style="text-transform:uppercase" onkeydown="if(event.key==='Enter')doStock()"/>
      <button class="btn btn-p" onclick="doStock()">🔍 วิเคราะห์</button>
    </div>
    <div style="font-size:9px;color:#4455aa">ตัวอย่าง: AAPL · MSFT · NVDA · TSLA · PTT.BK · SCB.BK · KBANK.BK</div>`;

  if (id === 2) return `
    <div class="frow">
      <button class="btn btn-p" onclick="doScan('SET')">🇹🇭 ตลาด SET</button>
      <button class="btn btn-p" onclick="doScan('NASDAQ')">🇺🇸 NASDAQ</button>
      <button class="btn btn-p" onclick="doScan('NYSE')">🏛️ NYSE</button>
    </div>
    <div style="font-size:9px;color:#4455aa">เลือกตลาดเพื่อสแกนหาหุ้นน่าสนใจ</div>`;

  if (id === 3) return `
    <div class="file-drop" id="fdrop"
      onclick="document.getElementById('fi').click()"
      ondragover="event.preventDefault();this.classList.add('over')"
      ondragleave="this.classList.remove('over')"
      ondrop="onDrop(event)">
      📁 คลิกหรือลากไฟล์ CSV / Excel มาวาง<br>
      <span style="font-size:9px;color:#5566aa">รองรับ .csv และ .xlsx</span>
    </div>
    <input type="file" id="fi" accept=".csv,.xlsx" style="display:none" onchange="onFileSel(this)"/>
    <div style="font-size:9px;color:#4455aa;text-align:center;margin:4px 0">— หรือวางข้อมูล CSV —</div>
    <div class="irow">
      <textarea id="dp" placeholder="ชื่อ,อายุ,ยอดขาย&#10;Alice,30,50000&#10;Bob,25,42000"></textarea>
      <button class="btn btn-p" style="align-self:flex-end" onclick="doPaste()">📊 วิเคราะห์</button>
    </div>`;

  if (id === 4) {
    const has = !!analysisData;
    return `
    <div style="font-size:9.5px;padding:7px 9px;border-radius:5px;margin-bottom:8px;
      background:${has?'#041a0e':'#1a0404'};border:1px solid ${has?'#1e6030':'#6a1818'};
      color:${has?'#44dd88':'#ff6655'}">
      ${has?`✅ มีข้อมูลจาก Ken (${analysisData.filename}) พร้อมสร้างสไลด์!`:'⚠️ ยังไม่มีข้อมูลจาก Ken — ระบุหัวข้อเองได้เลย'}
    </div>
    <div class="irow" style="margin-bottom:7px">
      <input id="pt" type="text" placeholder="${has?'ชื่อ Presentation (ไม่ระบุใช้ข้อมูลจาก Ken)':'หัวข้อ Presentation ที่ต้องการ...'}"/>
    </div>
    <div class="frow">
      <button class="btn btn-p" onclick="doPresent()">🎨 สร้าง Presentation</button>
      ${has?'<button class="btn btn-s" onclick="clearKen()">🗑️ ล้างข้อมูล Ken</button>':''}
    </div>`;
  }
}

function addMsg(type, html) {
  const el = document.createElement('div');
  el.className = 'cmsg ' + type;
  el.innerHTML = html;
  document.getElementById('pchat').appendChild(el);
  document.getElementById('pchat').scrollTop = 99999;
  return el;
}

function loader() {
  const el = document.createElement('div');
  el.className = 'cmsg agent'; el.id = 'lmsg';
  el.innerHTML = '<span class="ldot"></span><span class="ldot"></span><span class="ldot"></span>';
  document.getElementById('pchat').appendChild(el);
  document.getElementById('pchat').scrollTop = 99999;
}
function rmLoader() { const e = document.getElementById('lmsg'); if(e) e.remove(); }

// ---- Agent 1: Stock ----
async function doStock() {
  const el = document.getElementById('ti');
  const tk = el.value.trim().toUpperCase();
  if (!tk) return;
  addMsg('user', `🔍 วิเคราะห์หุ้น <b>${tk}</b>`);
  el.value = '';
  loader();
  try {
    const res = await window.cowork.askClaude(
`คุณเป็นนักวิเคราะห์การลงทุนมืออาชีพ วิเคราะห์หุ้น "${tk}" ตอบเป็นภาษาไทย ให้ข้อมูลต่อไปนี้:

🎯 คำแนะนำ: [ซื้อ / ขาย / ถือ] — ระบุชัดเจน
📋 เหตุผลหลัก: 3 ข้อ (สั้นๆ)
⚠️ ระดับความเสี่ยง: ต่ำ / กลาง / สูง
🎯 ราคาเป้าหมาย: ประมาณการ (หรือ N/A)
🚨 ข้อควรระวัง: 1-2 ข้อ
📅 กรอบเวลา: ระยะสั้น/กลาง/ยาว

⚠️ disclaimer สั้นๆ ท้ายว่านี่เป็นข้อมูลเพื่อประกอบการตัดสินใจเท่านั้น`, []);
    rmLoader();
    const buy = /ซื้อ|buy/i.test(res);
    const sell = /ขาย|sell/i.test(res);
    const sig = buy ? 'BUY' : sell ? 'SELL' : 'HOLD';
    const sc = buy ? 'stag-buy' : sell ? 'stag-sell' : 'stag-hold';
    addMsg('agent', `<span class="stag ${sc}">${sig}</span> <b>${tk}</b>\n\n${res}`);
  } catch(e) { rmLoader(); addMsg('agent', '❌ ' + (e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่ครับ')); }
}

// ---- Agent 2: Market Scan ----
async function doScan(mkt) {
  addMsg('user', `🔍 สแกนหาหุ้นน่าซื้อใน <b>${mkt}</b>`);
  loader();
  try {
    const res = await window.cowork.askClaude(
`คุณเป็นนักวิเคราะห์ตลาดหุ้น ${mkt} ผู้เชี่ยวชาญ ตอบเป็นภาษาไทย

แนะนำหุ้น 5 ตัวที่น่าสนใจใน${mkt==='SET'?'ตลาดหลักทรัพย์ไทย (SET)':'ตลาด '+mkt}ณ ช่วงนี้:

สำหรับแต่ละตัว ระบุ:
• ชื่อหุ้น / Ticker
• เหตุผลที่น่าสนใจ (1-2 ประโยค)
• ความเสี่ยง: ต่ำ / กลาง / สูง
• ประเภท: Growth / Dividend / Value

ปิดท้ายด้วย disclaimer สั้นๆ ว่าเป็นมุมมองทั่วไป ไม่ใช่คำแนะนำการลงทุน`, []);
    rmLoader();
    addMsg('agent', `📈 <b>หุ้นน่าสนใจ — ${mkt}</b>\n\n${res}`);
  } catch(e) { rmLoader(); addMsg('agent', '❌ ' + (e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่')); }
}

// ---- Agent 3: Data Analyst ----
function onDrop(e) {
  e.preventDefault();
  document.getElementById('fdrop').classList.remove('over');
  const f = e.dataTransfer.files[0]; if(f) procFile(f);
}
function onFileSel(inp) { const f = inp.files[0]; if(f) procFile(f); }

async function procFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  addMsg('user', `📁 <b>${file.name}</b> (${(file.size/1024).toFixed(1)} KB)`);
  if (ext === 'csv') {
    const r = new FileReader(); r.onload = e => analyzeData(e.target.result, file.name); r.readAsText(file,'UTF-8');
  } else if (ext === 'xlsx') {
    if (typeof XLSX !== 'undefined') {
      const r = new FileReader();
      r.onload = e => { try { const wb=XLSX.read(e.target.result,{type:'array'}); const ws=wb.Sheets[wb.SheetNames[0]]; analyzeData(XLSX.utils.sheet_to_csv(ws), file.name); } catch(err){ addMsg('agent','❌ ไม่สามารถอ่านไฟล์ Excel ได้ กรุณาแปลงเป็น .csv ก่อนครับ'); } };
      r.readAsArrayBuffer(file);
    } else {
      addMsg('agent','⚠️ กรุณาแปลงไฟล์ Excel เป็น .csv ก่อนครับ\n\n(Excel → Save As → CSV UTF-8)');
    }
  } else { addMsg('agent','❌ รองรับเฉพาะ .csv และ .xlsx ครับ'); }
}

async function doPaste() {
  const txt = document.getElementById('dp').value.trim();
  if (!txt) { addMsg('agent','⚠️ กรุณาวางข้อมูล CSV ก่อนครับ'); return; }
  addMsg('user','📋 วางข้อมูล CSV');
  analyzeData(txt, 'clipboard');
}

async function analyzeData(csv, fname) {
  loader();
  const rows = csv.split('\n');
  const preview = rows.slice(0,52).join('\n');
  const total = rows.length - 1;
  try {
    const res = await window.cowork.askClaude(
`คุณเป็น Senior Data Analyst ผู้เชี่ยวชาญ วิเคราะห์ข้อมูลนี้และตอบเป็นภาษาไทย

ไฟล์: ${fname} | จำนวนแถว: ~${total}

ข้อมูล:
${preview}

วิเคราะห์ให้ครบ:
📋 สรุปข้อมูล: เกี่ยวกับอะไร กี่คอลัมน์ ประเภทข้อมูล
📊 Insights สำคัญ: 4-5 ข้อค้นพบที่น่าสนใจ
📈 สถิติหลัก: ค่าเฉลี่ย สูงสุด ต่ำสุด ของคอลัมน์ตัวเลขสำคัญ
🔍 Pattern/แนวโน้ม: pattern ที่เห็นจากข้อมูล
💡 ข้อเสนอแนะ: 3 actions ที่ควรทำต่อ`, []);
    rmLoader();
    analysisData = { filename:fname, rows:total, preview, analysis:res };
    try { localStorage.setItem('pdoAnalysis', JSON.stringify(analysisData)); } catch(e){}
    addMsg('agent', `✅ <b>วิเคราะห์สำเร็จ!</b> (${total} แถว)\n\n${res}`);
    addMsg('sys','💡 ข้อมูลบันทึกแล้ว — Luna สามารถนำไปสร้าง Presentation ได้ทันที!');
  } catch(e) { rmLoader(); addMsg('agent', '❌ ' + (e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่ครับ')); }
}

// ---- Agent 4: Presentation ----
async function doPresent() {
  const topic = document.getElementById('pt')?.value?.trim() || '';
  let prompt, umsg;

  if (analysisData) {
    umsg = `🎨 สร้าง Presentation จาก <b>${analysisData.filename}</b>${topic?' — "'+topic+'"':''}`;
    prompt = `คุณเป็นผู้เชี่ยวชาญด้าน Presentation Design ระดับมืออาชีพ ตอบเป็นภาษาไทย

ข้อมูลจากการวิเคราะห์ของ Ken:
${analysisData.analysis}
${topic ? '\nหัวข้อเพิ่มเติม: '+topic : ''}

ออกแบบ Presentation 8 สไลด์ที่มีประสิทธิภาพ:

สำหรับแต่ละสไลด์ระบุ:
🖼️ ชื่อสไลด์
📝 เนื้อหาหลัก (bullet points หรือ key message)
🎨 คำแนะนำ Layout และสี`;
  } else if (topic) {
    umsg = `🎨 สร้าง Presentation: <b>"${topic}"</b>`;
    prompt = `คุณเป็นผู้เชี่ยวชาญด้าน Presentation Design ตอบเป็นภาษาไทย

หัวข้อ: "${topic}"

ออกแบบ Presentation 8 สไลด์สำหรับหัวข้อนี้:
1. หน้าปก (Title)
2. Agenda / Overview
3-5. เนื้อหาหลัก 3 ส่วน
6. ข้อมูล / สถิติ / Evidence
7. Key Takeaways / สรุป
8. Q&A / ขั้นตอนต่อไป

สำหรับแต่ละสไลด์: ชื่อ, เนื้อหา, คำแนะนำ layout`;
  } else {
    addMsg('agent','⚠️ กรุณาระบุหัวข้อ Presentation\nหรือให้ Ken วิเคราะห์ข้อมูลก่อนค่ะ');
    return;
  }

  addMsg('user', umsg);
  loader();
  try {
    const res = await window.cowork.askClaude(prompt, []);
    rmLoader();
    addMsg('agent', `🎨 <b>Presentation Plan พร้อมแล้ว!</b>\n\n${res}`);
    addMsg('sys','💡 คัดลอก outline นี้ไปสร้างใน PowerPoint หรือ Google Slides ได้เลยค่ะ');
  } catch(e) { rmLoader(); addMsg('agent', '❌ ' + (e.message || 'เกิดข้อผิดพลาด กรุณาลองใหม่ค่ะ')); }
}

function clearKen() {
  analysisData = null;
  try { localStorage.removeItem('pdoAnalysis'); } catch(e){}
  openAgent(4);
}

// Pulse animation on hints
let ph = 0;
setInterval(() => {
  ph = (ph + 0.05) % (Math.PI * 2);
  const o = (Math.sin(ph) * 0.25 + 0.35).toFixed(2);
  ['hint1','hint2','hint3','hint4'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.setAttribute('opacity', o);
  });
}, 50);
</script>
</body>
</html>
